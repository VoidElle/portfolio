name: Update banner screenshot

on:
  push:
    branches: [main]

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Build & serve
        run: npx vite preview --port 4173 &

      - name: Wait for server
        run: npx wait-on http://localhost:4173

      - name: Take screenshot
        run: node scripts/screenshot.mjs
        env:
          SITE_URL: http://localhost:4173

      - name: Commit banner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/banner.jpg
          git diff --cached --quiet || git commit -m "chore: update banner screenshot [skip ci]"
          git push